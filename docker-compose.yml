# Local development Postgres for the Tough Leaf compliance app.
# Matches the default DATABASE_URL in .env.example
# (postgres://tl:tl@localhost:5432/tl). Railway provides Postgres in prod.
#
#   yarn db:up        # start Postgres in the background
#   yarn db:migrate   # apply migrations
#   yarn db:seed      # load document types + seeded requirements
#   yarn db:down      # stop and remove the container (keeps the volume)
services:
  postgres:
    image: postgres:16-alpine
    container_name: tl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tl
      POSTGRES_PASSWORD: tl
      POSTGRES_DB: tl
    ports:
      - '5432:5432'
    volumes:
      - tl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tl -d tl']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: tl-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tl-minio
      MINIO_ROOT_PASSWORD: tl-minio-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - tl-minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/live']
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 tl-minio tl-minio-secret &&
      mc mb --ignore-existing local/tl-documents"

volumes:
  tl-postgres-data:
  tl-minio-data:
